name: Docs, Coverage, and Benchmarks to Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Branch coverage uses unstable nightly rustc flags. rustup pins nightlies by
  # date because semver labels such as 1.98.0-nightly are not unique installable
  # channels. Keeping this pinned makes coverage deterministic; switch to the
  # moving `nightly` channel only if we explicitly accept coverage breakage from
  # upstream nightly changes.
  # This pin is rustc 1.98.0-nightly (f28ac764c 2026-06-23).
  # To refresh: check the current nightly with
  # `rustup toolchain install nightly --profile minimal --component llvm-tools-preview`
  # or https://static.rust-lang.org/dist/channel-rust-nightly.toml, then verify
  # the coverage commands below locally before changing this date.
  COVERAGE_TOOLCHAIN: nightly-2026-06-25

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4
    - name: Install native dependencies
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y pkg-config libfontconfig1-dev
    - name: Install nightly LLVM tools
      run: rustup toolchain install "$COVERAGE_TOOLCHAIN" --profile minimal --component llvm-tools-preview
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Build Rust documentation
      run: cargo doc --workspace --all-features --no-deps
    - name: Run benchmarks
      run: cargo bench --benches
    - name: Generate coverage reports
      run: |
        mkdir -p public/coverage
        cargo +"$COVERAGE_TOOLCHAIN" llvm-cov clean --workspace
        cargo +"$COVERAGE_TOOLCHAIN" llvm-cov --workspace --all-features --no-report --branch
        cargo +"$COVERAGE_TOOLCHAIN" llvm-cov report --html --output-dir public/coverage
        mkdir -p target/llvm-cov
        cargo +"$COVERAGE_TOOLCHAIN" llvm-cov report --summary-only --json --output-path target/llvm-cov/summary.json
    - name: Prepare Pages site
      run: |
        mkdir -p public/doc public/benchmarks
        cp -r target/doc/. public/doc/
        cp -r target/criterion/. public/benchmarks/
        scripts/management/management_report --html public/management
        node <<'NODE'
        const fs = require("fs");
        const report = JSON.parse(fs.readFileSync("target/llvm-cov/summary.json", "utf8"));
        const rawPercent = Number(report?.data?.[0]?.totals?.lines?.percent ?? 0);
        const percent = Number.isFinite(rawPercent) ? rawPercent : 0;
        const color =
          percent >= 90 ? "brightgreen" :
          percent >= 80 ? "green" :
          percent >= 60 ? "yellow" :
          percent >= 40 ? "orange" :
          "red";

        fs.writeFileSync("public/coverage-badge.json", JSON.stringify({
          schemaVersion: 1,
          label: "coverage",
          message: `${percent.toFixed(1)}%`,
          color,
        }, null, 2) + "\n");

        fs.writeFileSync("public/index.html", `<!doctype html>
        <html lang="en">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>bot-starter-kit reports</title>
        </head>
        <body>
          <h1>bot-starter-kit reports</h1>
          <ul>
            <li><a href="./doc/bot_starter_kit/">Rust documentation</a></li>
            <li><a href="./coverage/html/">Coverage report</a></li>
            <li><a href="./benchmarks/report/">Benchmark report</a></li>
            <li><a href="./management/">Management report</a></li>
          </ul>
        </body>
        </html>
        `);
        NODE
    - name: Configure GitHub Pages
      uses: actions/configure-pages@v6
    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
