name: Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install native dependencies
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y pkg-config libfontconfig1-dev
    - name: Install LLVM tools
      run: rustup component add llvm-tools-preview
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Build Rust documentation
      run: cargo doc --workspace --all-features --no-deps
    - name: Generate coverage reports
      run: |
        mkdir -p public/coverage
        cargo llvm-cov clean --workspace
        cargo llvm-cov --workspace --all-features --no-report
        cargo llvm-cov report --html --output-dir public/coverage
        mkdir -p target/llvm-cov
        cargo llvm-cov report --summary-only --json --output-path target/llvm-cov/summary.json
    - name: Prepare Pages site
      run: |
        mkdir -p public/doc
        cp -r target/doc/. public/doc/
        node <<'NODE'
        const fs = require("fs");
        const report = JSON.parse(fs.readFileSync("target/llvm-cov/summary.json", "utf8"));
        const rawPercent = Number(report?.data?.[0]?.totals?.lines?.percent ?? 0);
        const percent = Number.isFinite(rawPercent) ? rawPercent : 0;
        const color =
          percent >= 90 ? "brightgreen" :
          percent >= 80 ? "green" :
          percent >= 60 ? "yellow" :
          percent >= 40 ? "orange" :
          "red";

        fs.writeFileSync("public/coverage-badge.json", JSON.stringify({
          schemaVersion: 1,
          label: "coverage",
          message: `${percent.toFixed(1)}%`,
          color,
        }, null, 2) + "\n");

        fs.writeFileSync("public/index.html", `<!doctype html>
        <html lang="en">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>bot-starter-kit reports</title>
        </head>
        <body>
          <h1>bot-starter-kit reports</h1>
          <ul>
            <li><a href="./doc/bot_starter_kit/">Rust documentation</a></li>
            <li><a href="./coverage/html/">Coverage report</a></li>
          </ul>
        </body>
        </html>
        `);
        NODE
    - name: Configure GitHub Pages
      uses: actions/configure-pages@v6
    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
