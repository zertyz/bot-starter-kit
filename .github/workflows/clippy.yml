name: Clippy

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  clippy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install native dependencies
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y pkg-config libfontconfig1-dev
    - name: Install Clippy
      run: rustup component add clippy
    - name: Check lints
      run: cargo clippy --all-targets --all-features -- -D warnings
