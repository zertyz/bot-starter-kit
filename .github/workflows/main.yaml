name: Rust

on:
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  check_and_build:
    name: Check and Build the release binary
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4
    - name: Install native dependencies
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y pkg-config libfontconfig1-dev
    - name: Install Rust components
      run: rustup component add rustfmt clippy
    - name: Check code guidelines
      run: scripts/enforce_code_guidelines
    - name: Check formatting
      run: cargo fmt --all -- --check
    - name: Check lints
      run: cargo clippy --all-targets --all-features -- -D warnings
    - name: Run tests
      run: cargo test --verbose
    - name: Broadwell Release Build
      run: |
        RUSTFLAGS="-C target-cpu=broadwell --remap-path-prefix=$PWD=" CFLAGS="-O3 -march=broadwell -mtune=broadwell" cargo build --release
    - name: Upload release executable
      uses: actions/upload-artifact@v7
      with:
        name: bot-starter-kit-release
        path: target/release/bot_starter_kit
        if-no-files-found: error
        retention-days: 1

  deploy:
    name: Deploy to production
    needs: check_and_build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: production

    steps:
      - name: Download release executable
        uses: actions/download-artifact@v8
        with:
          name: bot-starter-kit-release
          path: artifact

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          umask 077

          install -d -m 0700 "$HOME/.ssh"

          printf '%s\n' "$DEPLOY_SSH_KEY" |
            tr -d '\r' > "$HOME/.ssh/id_ed25519"

          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" \
            > "$HOME/.ssh/known_hosts"

          chmod 0600 \
            "$HOME/.ssh/id_ed25519" \
            "$HOME/.ssh/known_hosts"

          # Fail immediately if the secret does not contain a valid key.
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null

      - name: Upload and Restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_REMOTE_BINARY: ${{ secrets.DEPLOY_REMOTE_BINARY }}
        run: |
          chmod 0755 artifact/bot_starter_kit

          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          REMOTE_DIRECTORY="${DEPLOY_REMOTE_BINARY%/*}"

          SSH_OPTIONS=(
            -i "$HOME/.ssh/id_ed25519"
            -p "$DEPLOY_PORT"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o ConnectTimeout=20
          )

          SCP_OPTIONS=(
            -i "$HOME/.ssh/id_ed25519"
            -P "$DEPLOY_PORT"
            -p
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o ConnectTimeout=20
          )

          scp "${SCP_OPTIONS[@]}" \
            artifact/bot_starter_kit \
            "${REMOTE}:${DEPLOY_REMOTE_BINARY}~"

          # nohup and detached standard streams allow the process to survive
          # after the SSH connection closes.
          ssh "${SSH_OPTIONS[@]}" "$REMOTE" \
            "echo '### Shutting down the remote service:'; \
             pkill -f '[t]elegram_bot_rust_starter_kit' || true; \
             for i in {1..10}; do pgrep -f '[t]elegram_bot_rust_starter_kit' && sleep 5 || break; done; \
             mv '${DEPLOY_REMOTE_BINARY}~' '${DEPLOY_REMOTE_BINARY}'; \
             echo '### Restarting:'; \
             chmod 0755 '$DEPLOY_REMOTE_BINARY' && \
             nohup '$DEPLOY_REMOTE_BINARY' \
               >/tmp/log.log 2>&1 </dev/null & \
             sleep 5; head /tmp/log.log"

      - name: Remove SSH private key
        if: always()
        run: rm -f "$HOME/.ssh/id_ed25519"