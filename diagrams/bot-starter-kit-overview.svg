<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 720 220">
  <title id="title">Bot Starter Kit overview</title>
  <desc id="desc">A simple flow from messaging platforms through bot logic into repositories and databases.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="718" height="218" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="360" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">
    Bot Starter Kit
  </text>
  <g font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
    <rect x="48" y="86" width="130" height="64" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="113" y="113" fill="#1e3a8a">Messaging</text>
    <text x="113" y="134" fill="#1e3a8a">Platforms</text>
    <rect x="228" y="86" width="130" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="293" y="113" fill="#14532d">Bot</text>
    <text x="293" y="134" fill="#14532d">Logic</text>
    <rect x="408" y="86" width="130" height="64" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="473" y="113" fill="#78350f">Repository</text>
    <text x="473" y="134" fill="#78350f">Traits</text>
    <rect x="588" y="86" width="84" height="64" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
    <text x="630" y="113" fill="#581c87">Data</text>
    <text x="630" y="134" fill="#581c87">Stores</text>
  </g>
  <g fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M 178 118 H 218"/>
    <path d="M 358 118 H 398"/>
    <path d="M 538 118 H 578"/>
  </g>
  <text x="360" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">
    Channels feed domain logic; repositories keep storage choices behind stable contracts.
